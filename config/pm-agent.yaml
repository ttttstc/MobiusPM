# ── LLM 配置（业界标准：provider + model + api_key_env）──
llm:
  provider: anthropic
  model: claude-opus-4-7
  api_key_env: ANTHROPIC_API_KEY
  # base_url: https://your-proxy.example.com   # 自定义 endpoint（代理/兼容 API），默认官方
  max_tokens: 4096
  max_tokens_per_loop: 50000
  temperature: 0.3

excel:
  path: "source/项目630流水线排期计划.xlsx"
  sheet: "630攻关问题清单"

memory:
  db_path: "state/pm-agent.db"
  lookback_days: 14
  recent_decision_limit: 20
  max_briefs: 30

notifier:
  mode: mock               # mock | welink
  welink:
    cli_path: welink
    timeout: 30
    retry_count: 1

reminder:
  max_per_owner_per_day: 5
  max_per_run: 50

# ── daemon 模式调度配置 ──
daemon:
  cron_interval_minutes: 60
  cron_at: "09:00"
